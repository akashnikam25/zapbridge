services:
  postgres:
    image: postgres:16-alpine
    container_name: zapbridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zapbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set it in .env)}
      POSTGRES_DB: ${POSTGRES_DB:-zapbridge}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - zapbridge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zapbridge} -d ${POSTGRES_DB:-zapbridge}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zapbridge-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - zapbridge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zapbridge_pg_data:
  zapbridge_redis_data:
